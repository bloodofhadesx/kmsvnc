name: Build kmsvnc (arm64)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: debian:trixie-slim
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compilation dependencies
        run: |
          dpkg --add-architecture arm64
          apt-get update
          apt-get install -y crossbuild-essential-arm64 cmake pkg-config \
            libdrm-dev:arm64 libvncserver-dev:arm64 libxkbcommon-dev:arm64

      - name: Build kmsvnc
        run: |
          mkdir build && cd build
          cmake .. \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_FIND_ROOT_PATH=/usr/lib/aarch64-linux-gnu \
            -DCMAKE_FIND_ROOT_PATH_MODE_PROGRAM=NEVER \
            -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=ONLY \
            -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=ONLY \
            -DPKG_CONFIG_EXECUTABLE=aarch64-linux-gnu-pkg-config
          make -j$(nproc)

      - name: Verify binary
        run: file build/kmsvnc

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: kmsvnc-arm64
          path: build/kmsvnc

      - name: Create .deb package
        run: |
          mkdir -p deb-pkg/DEBIAN deb-pkg/usr/bin
          cp build/kmsvnc deb-pkg/usr/bin/
          printf '%s\n' \
            'Package: kmsvnc' \
            'Version: 1.0' \
            'Section: net' \
            'Priority: optional' \
            'Architecture: arm64' \
            'Depends: libvncserver1, libdrm2, libxkbcommon0' \
            'Maintainer: Lindroid <lindroid@lindroid.org>' \
            'Description: DRM/KMS-based VNC server' \
            ' VNC server that captures display output directly from' \
            ' the DRM/KMS subsystem and injects input via uinput.' \
            > deb-pkg/DEBIAN/control
          printf '#!/bin/sh\nset -e\nif [ -d /run/systemd/system ]; then\n  systemctl daemon-reload >/dev/null 2>&1 || true\nfi\n' \
            > deb-pkg/DEBIAN/postinst
          chmod 755 deb-pkg/DEBIAN/postinst
          dpkg-deb --build -Zgzip deb-pkg kmsvnc_1.0_arm64.deb

      - name: Upload .deb package
        uses: actions/upload-artifact@v4
        with:
          name: kmsvnc-arm64-deb
          path: kmsvnc_1.0_arm64.deb
