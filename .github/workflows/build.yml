name: Build kmsvnc (arm64)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - name: Build in native arm64 Debian Trixie
        run: |
          docker run --rm --platform linux/arm64 -v $PWD:/src -w /src \
            arm64v8/debian:trixie-slim \
            bash -c '
              set -e
              apt-get update
              apt-get install -y build-essential cmake pkg-config \
                libdrm-dev libvncserver-dev libxkbcommon-dev \
                libva-dev libva-drm-dev
              mkdir build && cd build
              cmake .. -DCMAKE_BUILD_TYPE=Release
              make -j$(nproc)
            '

      - name: Verify binary
        run: file build/kmsvnc

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: kmsvnc-arm64
          path: build/kmsvnc

      - name: Create .deb package
        run: |
          mkdir -p deb-pkg/DEBIAN deb-pkg/usr/bin
          cp build/kmsvnc deb-pkg/usr/bin/
          printf '%s\n' \
            'Package: kmsvnc' \
            'Version: 1.0' \
            'Section: net' \
            'Priority: optional' \
            'Architecture: arm64' \
            'Depends: libvncserver1, libdrm2, libxkbcommon0' \
            'Maintainer: Lindroid <lindroid@lindroid.org>' \
            'Description: DRM/KMS-based VNC server' \
            ' VNC server that captures display output directly from' \
            ' the DRM/KMS subsystem and injects input via uinput.' \
            > deb-pkg/DEBIAN/control
          printf '#!/bin/sh\nset -e\nif [ -d /run/systemd/system ]; then\n  systemctl daemon-reload >/dev/null 2>&1 || true\nfi\n' \
            > deb-pkg/DEBIAN/postinst
          chmod 755 deb-pkg/DEBIAN/postinst
          dpkg-deb --build -Zgzip deb-pkg kmsvnc_1.0_arm64.deb

      - name: Upload .deb package
        uses: actions/upload-artifact@v4
        with:
          name: kmsvnc-arm64-deb
          path: kmsvnc_1.0_arm64.deb
